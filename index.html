<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Positioning</title>
    <link rel="stylesheet" href="123456.css" />
</head>
<body>
    <h1>QR Positioning</h1>

    <!-- Map container -->
    <div id="mapContainer">
        <img src="map.png" id="map" alt="map" />
        <div id="marker"></div>
    </div>

    <!-- Scan button -->
    <button id="btn" onclick="toggleScanner()">SCAN</button>

    <!-- Camera container -->
    <div id="camera"></div>

    <!-- Inventory info -->
    <div id="inventoryInfo">
        <p id="itemName"></p>
        <p id="latitude"></p>
        <p id="longitude"></p>
    </div>

    <!-- QR scanner library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- Your JS -->
    <script src="123456.js"></script>
</body>
</html>
