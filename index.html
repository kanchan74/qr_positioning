<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Inventory System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>QR Inventory System</h1>

    <!-- Map container (optional) -->
    <div id="mapContainer">
        <img src="map.png" id="map" alt="map">
        <div id="marker"></div>
    </div>

    <!-- Scan / Cancel button -->
    <button id="btn" onclick="toggleScanner()">SCAN</button>

    <!-- Camera view for QR scanner -->
    <div id="camera"></div>

    <!-- Inventory info display -->
    <div id="inventoryInfo">
        <p id="itemName"></p>
        <p id="inStore"></p>
        <p id="price"></p>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="script.js"></script>
</body>
</html>
