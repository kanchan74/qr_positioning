<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scan App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Scan Image</h1>

  <button id="scanBtn">Scan</button>

  <!-- Hidden input for camera/file -->
  <input 
    type="file" 
    id="fileInput" 
    accept="image/*" 
    capture="environment" 
    hidden
  >

  <!-- Image preview -->
  <img id="preview" alt="Preview will appear here">

  <script src="script.js"></script>
</body>
</html>
